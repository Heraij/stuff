<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>
    <style>
        /* This is where our CSS lives for now */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <h1>Welcome to My Website!</h1>
    <p>I am building this from scratch using HTML, CSS, and JS.</p>
    
    <button id="magicButton">Click Me for Magic</button>

    <script>
        /* This is where our JavaScript lives */
        const button = document.getElementById('magicButton');
        button.addEventListener('click', () => {
            alert('🎉 It works! You just ran your first JavaScript code!');
        });
    </script>

</body>
</html>
