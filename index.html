<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Share Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🚀 ShareHub</h1>
        <p>Upload images or drop links to share with the board!</p>
    </header>

    <!-- THE UPLOAD ZONE -->
    <main class="upload-container">
        <div class="upload-box">
            <h3>Upload to the Hub</h3>
            <input type="text" id="itemTitle" placeholder="Give your item a title...">
            <input type="file" id="itemFile" accept="image/*">
            <button id="uploadBtn">Upload Item</button>
        </div>
    </main>

    <!-- THE DISPLAY BOARD -->
    <section class="hub-board" id="hubBoard">
        <!-- Uploaded items will dynamically appear here via JS -->
    </section>

    <script src="app.js"></script>
</body>
</html>
